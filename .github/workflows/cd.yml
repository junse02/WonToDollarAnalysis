name: CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build & Test
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Compute image name (lowercase)
        id: meta
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # 시크릿을 이 Environment 안에 넣어두었으므로 잡에 환경을 선언해야 읽을 수 있음
    environment: DEPLOY_HOST
    # 배포 서버를 준비한 뒤 저장소 변수 DEPLOY_ENABLED=true 로 설정하면 실행됨
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: docker-compose.yml
          target: ~/wontodollar

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: NAVER_CLIENT_ID,NAVER_CLIENT_SECRET,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            cd ~/wontodollar
            # GHCR 패키지가 private이면 로그인 (public이면 GHCR_PULL_TOKEN 미설정으로 건너뜀)
            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            # 런타임 시크릿을 .env 로 기록 (compose가 참조)
            cat > .env <<EOF
            NAVER_CLIENT_ID=$NAVER_CLIENT_ID
            NAVER_CLIENT_SECRET=$NAVER_CLIENT_SECRET
            EOF
            chmod 600 .env
            docker compose pull
            docker compose up -d
            docker image prune -f
