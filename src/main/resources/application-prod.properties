# 운영(prod) 프로필 - Docker/배포 환경에서 활성화 (SPRING_PROFILES_ACTIVE=prod)
# H2 데이터는 컨테이너의 /app/data 볼륨에 영속됨 (docker-compose volume)
# Naver 키는 환경변수 NAVER_CLIENT_ID / NAVER_CLIENT_SECRET 로 주입

# 보안: 운영에서는 H2 웹 콘솔 비활성화
spring.h2.console.enabled=false
spring.jpa.show-sql=false

# 액추에이터: 헬스체크만 노출 (Docker HEALTHCHECK / 배포 검증용)
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
