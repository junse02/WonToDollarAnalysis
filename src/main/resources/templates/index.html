<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환율 변동 원인 분석</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-dark px-4">
    <div class="d-flex align-items-center gap-2">
        <i class="bi bi-graph-up-arrow fs-5"></i>
        <span class="navbar-brand mb-0 fw-bold">환율 변동 원인 분석</span>
    </div>
    <div class="d-flex align-items-center gap-3">
        <span class="text-light-muted small">
            <i class="bi bi-clock me-1"></i>
            마지막 업데이트: <span th:text="${lastUpdated}">-</span>
        </span>
        <button class="btn btn-sm btn-outline-light" onclick="refreshData()">
            <i class="bi bi-arrow-clockwise me-1"></i>새로고침
        </button>
    </div>
</nav>

<div class="container-fluid px-4 mt-4">

    <!-- 상단 요약 카드 -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card stat-card h-100">
                <div class="card-body">
                    <div class="text-muted small mb-1">
                        <i class="bi bi-currency-dollar me-1"></i>USD/KRW 현재 환율
                    </div>
                    <div class="rate-display" th:text="${currentRate != null} ? ${#numbers.formatDecimal(currentRate, 1, 2)} + ' ₩' : 'N/A'">-</div>
                    <div class="text-muted small mt-1">기준통화 1 USD</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card h-100">
                <div class="card-body">
                    <div class="text-muted small mb-1">
                        <i class="bi bi-newspaper me-1"></i>분석된 뉴스
                    </div>
                    <div class="stat-number" th:text="${newsCount} + '건'">-</div>
                    <div class="text-muted small mt-1">최신 기사 기준</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card h-100">
                <div class="card-body">
                    <div class="text-muted small mb-1">
                        <i class="bi bi-tag me-1"></i>주요 키워드
                    </div>
                    <div class="stat-number keyword-highlight" th:text="${topKeyword}">-</div>
                    <div class="text-muted small mt-1">가장 많이 언급된 주제</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card h-100 summary-card">
                <div class="card-body">
                    <div class="text-muted small mb-1">
                        <i class="bi bi-lightbulb me-1"></i>분석 요약
                    </div>
                    <div class="summary-text" th:text="${summary}">-</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 환율 추이 차트 -->
    <div class="row g-3 mb-4">
        <div class="col-12">
            <div class="card chart-card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-graph-up me-2"></i>USD/KRW 환율 추이 (최근 7일)</span>
                    <span class="badge bg-primary">실시간</span>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(chartData)}" class="text-center text-muted py-4">
                        <i class="bi bi-hourglass-split fs-2 d-block mb-2"></i>
                        데이터를 수집 중입니다. 잠시 후 새로고침해 주세요.
                    </div>
                    <canvas id="rateChart" height="60" th:if="${!#lists.isEmpty(chartData)}"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 키워드 분석 + 뉴스 -->
    <div class="row g-3 mb-4">
        <div class="col-md-5">
            <div class="card chart-card h-100">
                <div class="card-header">
                    <i class="bi bi-bar-chart me-2"></i>키워드 분석 (뉴스 언급 빈도)
                </div>
                <div class="card-body">
                    <canvas id="keywordChart"></canvas>
                    <div class="mt-3 p-3 bg-light rounded small">
                        <strong>해석 가이드</strong><br>
                        달러 강세 요인: 연준 긴축, 지정학 리스크, 경기침체<br>
                        달러 약세 요인: 연준 완화, 무역흑자, 외국인 유입
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-newspaper me-2"></i>최신 뉴스</span>
                    <span class="text-muted small">최대 15건</span>
                </div>
                <div class="card-body p-0">
                    <div class="news-container">
                        <div th:if="${#lists.isEmpty(news)}" class="text-center text-muted py-4">
                            뉴스를 불러올 수 없습니다.
                        </div>
                        <div th:each="item, iter : ${news}" class="news-item">
                            <div class="d-flex align-items-start gap-2">
                                <span class="news-index" th:text="${iter.index + 1}">1</span>
                                <div class="flex-grow-1">
                                    <a th:href="${item.link}" th:text="${item.cleanTitle}"
                                       target="_blank" class="news-title">제목</a>
                                    <p th:text="${item.cleanDescription}"
                                       class="news-desc text-muted small mb-1">설명</p>
                                    <small class="text-muted">
                                        <i class="bi bi-clock me-1"></i>
                                        <span th:text="${item.formattedDate}">날짜</span>
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    const CHART_LABELS = /*[[${chartLabels}]]*/ [];
    const CHART_DATA   = /*[[${chartData}]]*/ [];
    const KW_LABELS    = /*[[${kwLabels}]]*/ [];
    const KW_VALUES    = /*[[${kwValues}]]*/ [];
    /*]]>*/
</script>
<script th:src="@{/js/main.js}"></script>

</body>
</html>
