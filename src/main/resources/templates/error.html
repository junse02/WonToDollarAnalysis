<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류 - 환율 변동 원인 분석</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width: 540px; margin-top: 12vh;">
    <div class="card border-0 shadow-sm text-center">
        <div class="card-body p-5">
            <i class="bi bi-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
            <h4 class="mt-3 mb-2">문제가 발생했습니다</h4>
            <p class="text-muted" th:text="${message} ?: '알 수 없는 오류가 발생했습니다.'">
                일시적인 오류가 발생했습니다.
            </p>
            <a href="/" class="btn btn-primary mt-2">
                <i class="bi bi-arrow-clockwise me-1"></i>다시 시도
            </a>
        </div>
    </div>
</div>
</body>
</html>
