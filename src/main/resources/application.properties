spring.application.name=Eco_Analysis
# 기본은 local, 배포 시 SPRING_PROFILES_ACTIVE=prod 로 오버라이드
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# H2 File Database (재시작해도 데이터 유지 - ./data/ecoanalysis.mv.db)
# AUTO_SERVER=TRUE: 앱과 H2 콘솔이 동시에 접속 가능
spring.datasource.url=jdbc:h2:file:./data/ecoanalysis;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# update: 스키마 유지하며 데이터 누적 (create-drop이면 매번 초기화됨)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Cache (Caffeine, 5분 TTL - 외부 API 호출량 절감)
spring.cache.type=caffeine
spring.cache.cache-names=news,currentRate
spring.cache.caffeine.spec=expireAfterWrite=5m,maximumSize=100

# Naver News API (application-local.properties에 실제 키 입력)
api.naver.client-id=${NAVER_CLIENT_ID:YOUR_NAVER_CLIENT_ID}
api.naver.client-secret=${NAVER_CLIENT_SECRET:YOUR_NAVER_CLIENT_SECRET}
# 환율은 Frankfurter API 사용 (키 불필요, https://api.frankfurter.app)

# Anthropic Claude (뉴스 카테고리 LLM 분류). 키가 비어 있으면 비활성화되고 키워드 매칭으로 폴백한다.
api.anthropic.api-key=${ANTHROPIC_API_KEY:}
api.anthropic.model=${ANTHROPIC_MODEL:claude-opus-4-8}