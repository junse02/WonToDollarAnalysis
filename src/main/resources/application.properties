spring.application.name=Eco_Analysis
spring.profiles.active=local

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:ecoanalysis
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Naver News API (application-local.properties에 실제 키 입력)
api.naver.client-id=${NAVER_CLIENT_ID:YOUR_NAVER_CLIENT_ID}
api.naver.client-secret=${NAVER_CLIENT_SECRET:YOUR_NAVER_CLIENT_SECRET}
# 환율은 Frankfurter API 사용 (키 불필요, https://api.frankfurter.app)