spring.application.name=Eco_Analysis
spring.profiles.active=local

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:ecoanalysis
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# API Keys - Set via environment variables or replace directly below
api.naver.client-id=${NAVER_CLIENT_ID:YOUR_NAVER_CLIENT_ID}
api.naver.client-secret=${NAVER_CLIENT_SECRET:YOUR_NAVER_CLIENT_SECRET}
api.exchange-rate.key=${EXCHANGE_RATE_API_KEY:YOUR_EXCHANGE_RATE_API_KEY}